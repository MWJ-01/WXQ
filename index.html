const FRIEND_NAME = "WXQ";

// 初始化星空 (保持不变)
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = star.style.height = (Math.random() * 1.5 + 1) + 'px';
    star.style.setProperty('--d', (Math.random() * 4 + 2) + 's');
    starsContainer.appendChild(star);
}

const scripts = [
    "你好，" + FRIEND_NAME + "。",
    "这里是为你持续运行的观测基站。",
    "观测站捕捉到少量“不开心”波动...",
    "已开启自动化过滤模式。",
    "我知道有些工作无法推掉，有些忙碌身不由己。",
    "但请在星光闪烁时，多留一点时间给自己。",
    "记得按时吃饭，累了就切换到“关机模式”。",
    "无论宇宙如何喧嚣，这里的信号始终稳定。",
    "现在，请闭上眼，许下一个关于自己的愿望。"
];

let sequenceStarted = false;
async function startSequence() {
    if (sequenceStarted) return;
    sequenceStarted = true;
    
    // 【关键修复 1】一旦开始，立即移除 body 的点击属性，防止任何误触
    document.body.onclick = null; 

    const box = document.getElementById('dialogue-box');
    for (let text of scripts) {
        await typeText(text);
        await new Promise(r => setTimeout(r, 1800));
    }

    box.style.opacity = "0";
    setTimeout(() => {
        box.style.display = "none";
        const wishArea = document.getElementById('wish-area');
        wishArea.style.display = "flex";
        setTimeout(() => { wishArea.style.opacity = "1"; }, 100);
    }, 1000);
}

function typeText(text) {
    return new Promise(resolve => {
        const box = document.getElementById('dialogue-box');
        box.innerHTML = "";
        let i = 0;
        const timer = setInterval(() => {
            if (i < text.length) {
                box.innerHTML += text.charAt(i);
                i++;
            } else {
                clearInterval(timer);
                setTimeout(resolve, 800);
            }
        }, 120);
    });
}

function extinguish(event) {
    // 【关键修复 2】阻止事件冒泡
    if (event) {
        event.stopPropagation();
        event.preventDefault();
    }

    const flame = document.getElementById('flame-element');
    const wishArea = document.getElementById('wish-area');

    flame.style.transform = "scale(0)";
    flame.style.opacity = "0";

    // 禁用按钮防止重复点击
    const btn = event?.target;
    if(btn) btn.disabled = true;

    setTimeout(() => {
        wishArea.style.opacity = "0";
        setTimeout(() => {
            wishArea.style.display = "none";
            showFinal();
        }, 1000);
    }, 1500);
}

let finalShown = false; 
function showFinal() {
    // 【关键修复 3】物理锁：如果已经运行过，直接物理断开
    if (window.isFinalDisplayed || finalShown) return;
    window.isFinalDisplayed = true; 
    finalShown = true;

    const cakeDisplay = document.getElementById('cake-display');
    const report = document.getElementById('final-report');
    
    // 【关键修复 4】强制清空，防止 DOM 缓存
    report.innerHTML = ""; 
    cakeDisplay.style.display = "flex";

    const lines = [
        "✨ 愿望已化作星光，加密同步至守护基站",
        "☀️ 生活偶尔疲惫，这里是你专属的停靠点",
        "🌙 若遇到不开心，信号塔 24h 为你开启",
        "🎂 生日快乐，愿 WXQ 平安健康，依然做最自由的星体"
    ];

    let i = 0;
    const timer = setInterval(() => {
        if (i < lines.length) {
            const d = document.createElement('div');
            d.innerText = "◈ " + lines[i];
            d.style.marginBottom = "10px";
            report.appendChild(d);
            i++;
        } else {
            clearInterval(timer);
        }
    }, 1200);
}
